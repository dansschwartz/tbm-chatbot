services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: tbm
      POSTGRES_PASSWORD: tbm_dev_password
      POSTGRES_DB: tbm_chatbot
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations/001_initial.sql:/docker-entrypoint-initdb.d/001_initial.sql

  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://tbm:tbm_dev_password@db:5432/tbm_chatbot
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ADMIN_API_KEY: ${ADMIN_API_KEY:-dev-admin-key}
      CORS_ORIGINS: "*"
      LOG_LEVEL: INFO
    depends_on:
      - db

volumes:
  pgdata:
